<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Franse Oefenkaartjes</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF6EC;
    --card-front: #FFFEF8;
    --card-back: #1A3A5C;
    --accent1: #F4845F;
    --accent2: #4ECDC4;
    --accent3: #FFD93D;
    --know: #6BCB77;
    --unknown: #F4845F;
    --text-dark: #1A3A5C;
    --text-mid: #5A7A9A;
    --text-light: #A0BDD0;
    --shadow: rgba(26,58,92,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Decorative dots background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(26,58,92,0.06) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .page { width: 100%; max-width: 640px; padding: 0 20px 60px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 32px 0 16px;
  }

  .header-flag {
    font-size: 2.6rem;
    display: inline-block;
    animation: wiggle 3s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)}
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.1;
    margin-top: 4px;
  }
  h1 em {
    font-style: normal;
    color: var(--accent1);
    position: relative;
  }
  h1 em::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 0; right: 0;
    height: 4px;
    background: var(--accent3);
    border-radius: 2px;
    transform: skewX(-8deg);
  }

  .tagline {
    color: var(--text-mid);
    font-size: 0.95rem;
    margin-top: 6px;
    font-weight: 600;
  }

  /* ── CATEGORY PILLS ── */
  .cat-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 16px 0 8px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    border: 2px solid #D8E8F0;
    background: white;
    border-radius: 50px;
    padding: 7px 16px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .cat-pill:hover { border-color: var(--accent2); color: var(--text-dark); }
  .cat-pill.active {
    background: var(--text-dark);
    border-color: var(--text-dark);
    color: white;
    box-shadow: 0 4px 10px var(--shadow);
  }
  .cat-pill.all.active {
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    border-color: transparent;
  }

  /* ── PROGRESS ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0 6px;
  }
  .progress-track {
    flex: 1;
    height: 8px;
    background: #DCEAF2;
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--accent2), var(--text-dark));
    transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .progress-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-mid);
    white-space: nowrap;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-chip {
    flex: 1;
    background: white;
    border-radius: 14px;
    padding: 10px 12px;
    text-align: center;
    box-shadow: 0 2px 10px var(--shadow);
    transition: transform 0.2s;
  }
  .stat-chip:hover { transform: translateY(-2px); }
  .stat-num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text-dark);
    display: block;
    line-height: 1;
  }
  .stat-num.green { color: var(--know); }
  .stat-num.orange { color: var(--unknown); }
  .stat-label { font-size: 0.72rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── CARD SCENE ── */
  .card-scene {
    perspective: 1200px;
    width: 100%;
    height: 280px;
    margin-bottom: 16px;
    cursor: pointer;
  }

  .card-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  }
  .card-3d.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 30px;
    user-select: none;
  }

  /* Front face */
  .card-front {
    background: var(--card-front);
    box-shadow: 0 10px 40px var(--shadow), 0 2px 8px rgba(26,58,92,0.06);
    border: 2px solid rgba(26,58,92,0.06);
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 24px 24px 0 0;
    background: linear-gradient(90deg, var(--accent1), var(--accent3), var(--accent2));
  }

  .card-lang-tag {
    position: absolute;
    top: 18px;
    right: 18px;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    color: white;
    font-size: 0.72rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 50px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card-cat-tag {
    position: absolute;
    top: 18px;
    left: 18px;
    color: var(--text-light);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .card-word {
    font-family: 'Caveat', cursive;
    font-size: 3rem;
    font-weight: 700;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.2;
    max-width: 100%;
    word-break: break-word;
  }

  .card-hint {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 600;
  }

  .flip-indicator {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 0.75rem;
    color: var(--text-light);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .flip-icon { font-size: 1rem; animation: spin-hint 3s ease-in-out infinite; }
  @keyframes spin-hint {
    0%,100%{transform:rotate(0deg)} 50%{transform:rotate(180deg)}
  }

  /* Back face */
  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    box-shadow: 0 10px 40px rgba(26,58,92,0.3);
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: 
      radial-gradient(circle at 20% 30%, rgba(78,205,196,0.2) 0%, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(244,132,95,0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .card-back .card-lang-tag {
    background: linear-gradient(135deg, var(--accent2), #2ECC71);
  }
  .card-back .card-cat-tag { color: rgba(255,255,255,0.35); }
  .card-back .card-word { color: white; }
  .card-back .card-hint { color: rgba(255,255,255,0.4); }
  .card-back .flip-indicator { color: rgba(255,255,255,0.3); }

  /* ── ACTION BUTTONS ── */
  .action-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .action-btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 16px 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .action-btn:active { transform: scale(0.96); }

  .btn-unknown {
    background: #FFF0EB;
    color: var(--unknown);
    border: 2.5px solid #FFD0C0;
  }
  .btn-unknown:hover { background: var(--unknown); color: white; border-color: var(--unknown); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(244,132,95,0.35); }

  .btn-know {
    background: #EDFFF1;
    color: var(--know);
    border: 2.5px solid #C0EEC8;
  }
  .btn-know:hover { background: var(--know); color: white; border-color: var(--know); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(107,203,119,0.35); }

  /* ── NAV ROW ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .nav-btn {
    background: white;
    border: 2px solid #D8E8F0;
    border-radius: 50%;
    width: 46px; height: 46px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .nav-btn:hover { border-color: var(--accent2); transform: scale(1.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .nav-counter {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text-dark);
    min-width: 80px;
    text-align: center;
  }

  /* ── SHUFFLE / RESET ROW ── */
  .control-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ctrl-btn {
    flex: 1;
    background: white;
    border: 2px solid #D8E8F0;
    border-radius: 12px;
    padding: 10px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ctrl-btn:hover { border-color: var(--text-dark); color: var(--text-dark); transform: translateY(-1px); }
  .ctrl-btn.highlight {
    background: var(--unknown);
    border-color: var(--unknown);
    color: white;
  }
  .ctrl-btn.highlight:hover { opacity: 0.9; }

  /* ── FINISHED OVERLAY ── */
  .finished-card {
    background: white;
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 10px 40px var(--shadow);
    display: none;
    animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .finished-emoji { font-size: 4.5rem; display: block; margin-bottom: 10px; }
  .finished-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  .finished-sub { color: var(--text-mid); font-size: 1rem; font-weight: 600; margin-bottom: 24px; }

  .result-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .result-half {
    flex: 1;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
  }
  .result-half.green { background: #EDFFF1; border: 2px solid #C0EEC8; }
  .result-half.orange { background: #FFF0EB; border: 2px solid #FFD0C0; }
  .result-half .rh-num { font-size: 2.2rem; font-weight: 800; }
  .result-half.green .rh-num { color: var(--know); }
  .result-half.orange .rh-num { color: var(--unknown); }
  .result-half .rh-label { font-size: 0.8rem; font-weight: 700; color: var(--text-mid); }

  .fin-btn {
    display: inline-block;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin: 5px;
  }
  .fin-btn:hover { transform: translateY(-2px); }
  .fin-btn.primary {
    background: var(--text-dark);
    color: white;
    box-shadow: 0 6px 18px var(--shadow);
  }
  .fin-btn.secondary {
    background: var(--unknown);
    color: white;
    box-shadow: 0 6px 18px rgba(244,132,95,0.3);
  }

  /* ── DIRECTION TOGGLE ── */
  .direction-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: white;
    border-radius: 50px;
    padding: 5px;
    box-shadow: 0 3px 12px var(--shadow);
    margin: 0 auto 18px;
    width: fit-content;
    border: 2px solid #D8E8F0;
  }

  .dir-opt {
    border: none;
    background: transparent;
    border-radius: 50px;
    padding: 9px 20px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.22s;
    white-space: nowrap;
  }
  .dir-opt.active {
    background: var(--text-dark);
    color: white;
    box-shadow: 0 3px 10px var(--shadow);
  }
  .dir-arrow {
    font-size: 1rem;
    color: var(--text-light);
    padding: 0 2px;
    pointer-events: none;
  }

  /* touch swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 8px;
  }

  @media (max-width: 420px) {
    .card-word { font-size: 2.2rem; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <span class="header-flag">🇫🇷</span>
    <h1>Oefenkaartjes<br><em>Frans</em></h1>
    <p class="tagline">Klik op een kaartje om het om te draaien!</p>
  </header>

  <!-- Direction toggle -->
  <div class="direction-toggle">
    <button class="dir-opt active" id="dir-fr-nl" onclick="setDirection('fr-nl')">🇫🇷 Frans → 🇧🇪 NL</button>
    <button class="dir-opt" id="dir-nl-fr" onclick="setDirection('nl-fr')">🇧🇪 NL → 🇫🇷 Frans</button>
  </div>

  <!-- Category pills -->
  <div class="cat-scroll" id="cat-scroll"></div>

  <!-- Progress -->
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-label" id="progress-label">0 / 0</span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-chip">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Kaartjes</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num green" id="stat-know">0</span>
      <span class="stat-label">Ik ken dit ✓</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num orange" id="stat-unknown">0</span>
      <span class="stat-label">Nog leren ✗</span>
    </div>
  </div>

  <!-- Card -->
  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-3d" id="card-3d">

      <div class="card-face card-front">
        <span class="card-cat-tag" id="front-cat"></span>
        <span class="card-lang-tag" id="front-lang-tag">🇫🇷 Frans</span>
        <div class="card-word" id="front-word">–</div>
        <div class="card-hint" id="front-hint"></div>
        <div class="flip-indicator"><span class="flip-icon">↻</span> Klik om te draaien</div>
      </div>

      <div class="card-face card-back">
        <span class="card-cat-tag" id="back-cat"></span>
        <span class="card-lang-tag" id="back-lang-tag">🇧🇪 Nederlands</span>
        <div class="card-word" id="back-word">–</div>
        <div class="card-hint" id="back-hint"></div>
        <div class="flip-indicator"><span class="flip-icon">↻</span> Klik om terug te draaien</div>
      </div>

    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-row" id="action-row">
    <button class="action-btn btn-unknown" onclick="markCard(false)">✗ Nog leren</button>
    <button class="action-btn btn-know" onclick="markCard(true)">✓ Ik ken dit!</button>
  </div>

  <!-- Nav -->
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="prevCard()">←</button>
    <span class="nav-counter" id="nav-counter">1 / 1</span>
    <button class="nav-btn" id="btn-next" onclick="nextCard()">→</button>
  </div>

  <p class="swipe-hint">← → navigeren · klik kaartje om te draaien</p>

  <!-- Controls -->
  <div class="control-row">
    <button class="ctrl-btn" onclick="shuffle()">🔀 Schudden</button>
    <button class="ctrl-btn" onclick="resetMarks()">↺ Reset voortgang</button>
    <button class="ctrl-btn highlight" id="btn-unknown-only" onclick="filterUnknown()">✗ Alleen fouten</button>
  </div>

  <!-- Finished -->
  <div class="finished-card" id="finished-card">
    <span class="finished-emoji" id="fin-emoji">🎉</span>
    <div class="finished-title" id="fin-title">Alle kaartjes gezien!</div>
    <div class="finished-sub" id="fin-sub"></div>
    <div class="result-bar">
      <div class="result-half green"><div class="rh-num" id="fin-know">0</div><div class="rh-label">Ik ken dit ✓</div></div>
      <div class="result-half orange"><div class="rh-num" id="fin-unknown">0</div><div class="rh-label">Nog leren ✗</div></div>
    </div>
    <button class="fin-btn primary" onclick="restartAll()">🔄 Opnieuw beginnen</button>
    <button class="fin-btn secondary" id="fin-unknown-btn" onclick="practiceUnknown()">✗ Oefen fouten</button>
  </div>

</div>

<script>
const VOCAB = {
  "🛒 Naamwoorden": [
    ["une baguette","een stokbrood"],["une bouteille","een fles"],["le café","de koffie"],
    ["le coca","de cola"],["une course","een boodschap"],["un fruit / les fruits","een vrucht / fruit"],
    ["un légume","een groente"],["une limonade","een limonade"],["une liste","een lijst"],
    ["une liste des courses","een boodschappenlijst"],["un pain","een brood"],
    ["une poire","een peer"],["une pomme","een appel"],["un supermarché","een supermarkt"],
    ["une école","een school"],["un magasin","een winkel"],["une maison","een huis"],
    ["un croissant","een croissant"],["le séjour","de woonkamer"],["un garage","een garage"],
  ],
  "⚡ Werkwoorden": [
    ["aider","helpen"],["faire","doen, maken"],["savoir","weten"],["venir","komen"],["vouloir","willen"],
  ],
  "📝 Faire": [
    ["je fais","ik doe / maak"],["tu fais","jij doet / maakt"],["il / elle fait","hij / zij doet / maakt"],
    ["nous faisons","wij doen / maken"],["vous faites","jullie doen / maken"],["ils / elles font","zij doen / maken"],
  ],
  "💬 Andere woorden": [
    ["maintenant","nu"],["ne … pas","niet, geen"],["ne … plus","niet meer, geen meer"],
    ["rien","niets"],["tout","alles"],["dans","in"],["depuis","sinds"],
    ["contre","tegen"],["sur","op"],["sous","onder"],["devant","voor"],["derrière","achter"],
  ],
  "❓ Vraagwoorden": [
    ["où","waar"],["quel / quelle","welk / welke"],["combien","hoeveel"],
    ["comment","hoe"],["qui","wie"],["quoi","wat"],
  ],
  "↔️ Tegenstellingen": [
    ["petit","klein"],["grand","groot"],["beaucoup","veel"],["peu","weinig"],
    ["là","daar"],["ici","hier"],["blanc","wit"],["noir","zwart"],
    ["hier","gisteren"],["demain","morgen"],["gauche","links"],["droite","rechts"],
    ["oui","ja"],["non","nee"],
  ],
  "🗣️ Uitdrukkingen": [
    ["De quoi as-tu besoin ?","Wat heb je nodig?"],
    ["Il n'est pas là.","Hij is er niet."],
    ["Je sais.","Ik weet het."],
    ["Je ne sais pas.","Ik weet het niet."],
    ["Je veux bien t'aider.","Ik wil je wel helpen."],
    ["Je fais les courses.","Ik doe de boodschappen."],
    ["C'est tout.","Dat is alles."],
    ["Rien pour l'instant.","Niets voor het ogenblik."],
    ["Tu viens avec moi ?","Kom je mee met mij?"],
    ["D'accord.","Akkoord."],
    ["Il me faut …","Ik heb … nodig."],
    ["J'ai besoin de …","Ik heb … nodig."],
    ["Qu'est-ce que vous faites ?","Wat doen jullie?"],
  ],
};

let deck = [];        // current deck [{fr, nl, cat, known: null/true/false}]
let idx = 0;
let isFlipped = false;
let selectedCat = 'all';
let direction = 'fr-nl'; // 'fr-nl' or 'nl-fr'

function setDirection(dir) {
  direction = dir;
  document.getElementById('dir-fr-nl').classList.toggle('active', dir === 'fr-nl');
  document.getElementById('dir-nl-fr').classList.toggle('active', dir === 'nl-fr');
  // reset flip
  isFlipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  render();
}

// Build full deck
function buildDeck(catFilter, knownFilter) {
  let result = [];
  Object.entries(VOCAB).forEach(([cat, pairs]) => {
    if (catFilter !== 'all' && cat !== catFilter) return;
    pairs.forEach(([fr, nl]) => result.push({ fr, nl, cat, known: null }));
  });
  return result;
}

function shuffle(arr) {
  arr = arr || deck;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  idx = 0;
  isFlipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  render();
}

// Build category pills
const catScroll = document.getElementById('cat-scroll');
[{key:'all', label:'🌟 Alles'}, ...Object.keys(VOCAB).map(k => ({key:k, label:k}))].forEach(({key, label}) => {
  const pill = document.createElement('button');
  pill.className = 'cat-pill' + (key === 'all' ? ' all active' : '');
  pill.textContent = label;
  pill.onclick = () => {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedCat = key;
    deck = buildDeck(selectedCat);
    shuffle(deck);
  };
  catScroll.appendChild(pill);
});

// Init
deck = buildDeck('all');
shuffle(deck);

function render() {
  if (deck.length === 0) return;
  const card = deck[idx];

  const frontWord = direction === 'fr-nl' ? card.fr : card.nl;
  const backWord  = direction === 'fr-nl' ? card.nl : card.fr;
  const frontLang = direction === 'fr-nl' ? '🇫🇷 Frans' : '🇧🇪 Nederlands';
  const backLang  = direction === 'fr-nl' ? '🇧🇪 Nederlands' : '🇫🇷 Frans';

  document.getElementById('front-word').textContent = frontWord;
  document.getElementById('front-cat').textContent = card.cat;
  document.getElementById('front-lang-tag').textContent = frontLang;
  document.getElementById('back-word').textContent = backWord;
  document.getElementById('back-cat').textContent = card.cat;
  document.getElementById('back-lang-tag').textContent = backLang;

  document.getElementById('nav-counter').textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === deck.length - 1;

  // Progress
  const seen = deck.filter(c => c.known !== null).length;
  const pct = deck.length ? (seen / deck.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${seen} / ${deck.length}`;

  // Stats
  const know = deck.filter(c => c.known === true).length;
  const unknown = deck.filter(c => c.known === false).length;
  document.getElementById('stat-total').textContent = deck.length;
  document.getElementById('stat-know').textContent = know;
  document.getElementById('stat-unknown').textContent = unknown;

  // Card glow based on known state
  const scene = document.getElementById('card-3d');
  scene.style.filter = '';
  if (card.known === true) scene.style.filter = 'drop-shadow(0 0 12px rgba(107,203,119,0.5))';
  if (card.known === false) scene.style.filter = 'drop-shadow(0 0 12px rgba(244,132,95,0.5))';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-3d').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (idx < deck.length - 1) {
    idx++;
    isFlipped = false;
    document.getElementById('card-3d').classList.remove('flipped');
    render();
    animateCard('right');
  } else {
    showFinished();
  }
}

function prevCard() {
  if (idx > 0) {
    idx--;
    isFlipped = false;
    document.getElementById('card-3d').classList.remove('flipped');
    render();
    animateCard('left');
  }
}

function animateCard(dir) {
  const scene = document.getElementById('card-scene');
  scene.style.transform = `translateX(${dir === 'right' ? '30px' : '-30px'})`;
  scene.style.opacity = '0.6';
  setTimeout(() => {
    scene.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
    scene.style.transform = 'translateX(0)';
    scene.style.opacity = '1';
    setTimeout(() => scene.style.transition = '', 250);
  }, 20);
}

function markCard(known) {
  deck[idx].known = known;
  render();
  setTimeout(() => nextCard(), 320);
}

function resetMarks() {
  deck.forEach(c => c.known = null);
  idx = 0;
  isFlipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  document.getElementById('finished-card').style.display = 'none';
  document.getElementById('card-scene').style.display = 'block';
  document.getElementById('action-row').style.display = 'flex';
  render();
}

function filterUnknown() {
  const unknown = deck.filter(c => c.known === false);
  if (unknown.length === 0) { alert("Geen foute kaartjes! Je kent ze allemaal 🎉"); return; }
  deck = unknown.map(c => ({...c, known: null}));
  idx = 0; isFlipped = false;
  document.getElementById('card-3d').classList.remove('flipped');
  document.getElementById('finished-card').style.display = 'none';
  document.getElementById('card-scene').style.display = 'block';
  document.getElementById('action-row').style.display = 'flex';
  render();
}

function showFinished() {
  const know = deck.filter(c => c.known === true).length;
  const unknown = deck.filter(c => c.known === false).length;
  const pct = deck.length ? Math.round((know / deck.length) * 100) : 0;

  document.getElementById('fin-know').textContent = know;
  document.getElementById('fin-unknown').textContent = unknown;
  document.getElementById('fin-emoji').textContent = pct >= 90 ? '🏆' : pct >= 60 ? '🌟' : '💪';
  document.getElementById('fin-title').textContent = pct >= 90 ? 'Fantastisch!' : pct >= 60 ? 'Goed bezig!' : 'Blijven oefenen!';
  document.getElementById('fin-sub').textContent = `${pct}% gekend · ${know} van de ${deck.length} kaartjes`;
  document.getElementById('fin-unknown-btn').style.display = unknown > 0 ? 'inline-block' : 'none';

  document.getElementById('card-scene').style.display = 'none';
  document.getElementById('action-row').style.display = 'none';
  document.getElementById('finished-card').style.display = 'block';
}

function restartAll() {
  deck = buildDeck(selectedCat);
  shuffle(deck);
  document.getElementById('finished-card').style.display = 'none';
  document.getElementById('card-scene').style.display = 'block';
  document.getElementById('action-row').style.display = 'flex';
}

function practiceUnknown() {
  filterUnknown();
  document.getElementById('finished-card').style.display = 'none';
  document.getElementById('card-scene').style.display = 'block';
  document.getElementById('action-row').style.display = 'flex';
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 'k' || e.key === 'K') markCard(true);
  else if (e.key === 'f' || e.key === 'F') markCard(false);
});

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.getElementById('card-scene').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.getElementById('card-scene').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextCard(); else prevCard();
  } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    flipCard();
  }
}, {passive: true});
</script>
</body>
