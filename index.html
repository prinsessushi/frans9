<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇫🇷 Frans Oefenen met Olivia</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5BC4F5;
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --purple: #A78BFA;
    --navy: #1E3A5F;
    --cream: #FFFBF0;
    --card: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 10% 20%, rgba(91,196,245,0.15) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(167,139,250,0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,217,61,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .flag-emoji { font-size: 3rem; display: block; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-family: 'Fredoka One', sans-serif;
    font-size: 2.8rem;
    color: var(--navy);
    line-height: 1.1;
    margin-top: 8px;
  }
  h1 span { color: var(--sky); }

  .subtitle {
    font-size: 1rem;
    color: #7A8BA0;
    margin-top: 6px;
    font-weight: 600;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
  }

  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  .score-pill:hover { transform: scale(1.05); }
  .score-pill .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-green { background: var(--mint); }
  .dot-red { background: var(--coral); }
  .dot-total { background: var(--sky); }

  /* Category selector */
  .category-section {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }

  .category-section h2 {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.2rem;
    color: var(--navy);
    margin-bottom: 12px;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .cat-btn {
    border: 2.5px solid #E5EAF0;
    background: white;
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: #7A8BA0;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .cat-btn:hover { border-color: var(--sky); color: var(--navy); transform: translateY(-1px); }
  .cat-btn.active {
    border-color: transparent;
    background: linear-gradient(135deg, var(--sky), var(--purple));
    color: white;
    box-shadow: 0 4px 12px rgba(91,196,245,0.4);
  }

  /* Mode selector */
  .mode-section {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  .mode-section h2 {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.2rem;
    color: var(--navy);
    margin-bottom: 12px;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .mode-btn {
    border: 2.5px solid #E5EAF0;
    background: white;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: #7A8BA0;
  }
  .mode-btn .mode-icon { font-size: 1.8rem; display: block; margin-bottom: 4px; }
  .mode-btn .mode-label { font-size: 0.85rem; display: block; }
  .mode-btn:hover { border-color: var(--sun); color: var(--navy); transform: translateY(-1px); }
  .mode-btn.active {
    border-color: transparent;
    background: linear-gradient(135deg, var(--sun), #FFB347);
    color: var(--navy);
    box-shadow: 0 4px 12px rgba(255,217,61,0.4);
  }

  /* Start button */
  .start-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--navy), #2D5A8E);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 18px;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(30,58,95,0.3);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,58,95,0.4); }
  .start-btn:active { transform: translateY(0); }

  /* Quiz card */
  .quiz-card {
    background: white;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    display: none;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-bar-wrap {
    background: #F0F4F8;
    border-radius: 50px;
    height: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--sky), var(--purple));
    transition: width 0.4s ease;
  }

  .q-counter {
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: #A0B0C0;
    margin-bottom: 6px;
  }

  .category-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--sky), var(--purple));
    color: white;
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .question-box {
    text-align: center;
    margin-bottom: 28px;
  }

  .direction-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: #A0B0C0;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .question-word {
    font-family: 'Fredoka One', sans-serif;
    font-size: 2.4rem;
    color: var(--navy);
    background: linear-gradient(135deg, #F0F7FF, #EEF2FF);
    border-radius: 16px;
    padding: 20px 30px;
    display: inline-block;
    min-width: 200px;
    box-shadow: inset 0 2px 8px rgba(91,196,245,0.15);
  }

  /* Multiple choice */
  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .mc-option {
    border: 2.5px solid #E5EAF0;
    background: white;
    border-radius: 14px;
    padding: 16px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .mc-option:hover:not(:disabled) { border-color: var(--sky); background: #F0FAFF; transform: translateY(-2px); }
  .mc-option.correct { border-color: var(--mint); background: #EDFFF1; color: #1A7A2E; animation: pulse-green 0.3s ease; }
  .mc-option.wrong { border-color: var(--coral); background: #FFF0F0; color: #C0392B; animation: shake 0.3s ease; }
  .mc-option.reveal { border-color: var(--mint); background: #EDFFF1; color: #1A7A2E; }
  .mc-option:disabled { cursor: default; }

  @keyframes pulse-green {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Type input */
  .type-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .type-input {
    flex: 1;
    border: 2.5px solid #E5EAF0;
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    outline: none;
    transition: border-color 0.2s;
  }
  .type-input:focus { border-color: var(--sky); }
  .type-input.correct { border-color: var(--mint); background: #EDFFF1; }
  .type-input.wrong { border-color: var(--coral); background: #FFF0F0; }

  .check-btn {
    background: linear-gradient(135deg, var(--sky), var(--purple));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 22px;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .check-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(91,196,245,0.4); }

  /* Feedback */
  .feedback {
    text-align: center;
    margin-top: 18px;
    font-size: 1.4rem;
    font-weight: 800;
    min-height: 40px;
    transition: all 0.3s;
  }
  .feedback.correct-msg { color: var(--mint); }
  .feedback.wrong-msg { color: var(--coral); }

  .correct-answer-reveal {
    text-align: center;
    margin-top: 8px;
    font-size: 0.9rem;
    color: #7A8BA0;
    font-weight: 600;
    min-height: 24px;
  }

  .next-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--mint), #2ECC71);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.2rem;
    cursor: pointer;
    margin-top: 18px;
    transition: all 0.2s;
    display: none;
  }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(107,203,119,0.4); }

  /* Results */
  .results-card {
    background: white;
    border-radius: 24px;
    padding: 36px 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    display: none;
    animation: slideIn 0.4s ease;
  }
  .result-trophy { font-size: 5rem; display: block; animation: bounce 1s ease-in-out infinite; margin-bottom: 10px; }
  .result-title {
    font-family: 'Fredoka One', sans-serif;
    font-size: 2.2rem;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-score {
    font-size: 4rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--sky), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 10px 0;
  }
  .result-sub { color: #7A8BA0; font-size: 1rem; font-weight: 600; margin-bottom: 24px; }

  .wrong-list {
    text-align: left;
    background: #FFF8F8;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    border: 2px solid #FFE0E0;
  }
  .wrong-list h3 {
    font-family: 'Fredoka One', sans-serif;
    color: var(--coral);
    margin-bottom: 10px;
    font-size: 1.1rem;
  }
  .wrong-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #FFE8E8;
    font-size: 0.9rem;
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-fr { font-weight: 700; color: var(--navy); }
  .wrong-nl { color: #7A8BA0; }

  .retry-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--navy), #2D5A8E);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px 36px;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(30,58,95,0.3);
    margin: 6px;
  }
  .retry-btn:hover { transform: translateY(-2px); }

  .wrong-only-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--coral), #E74C3C);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px 36px;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(255,107,107,0.3);
    margin: 6px;
  }
  .wrong-only-btn:hover { transform: translateY(-2px); }

  /* Responsive */
  @media (max-width: 480px) {
    h1 { font-size: 2rem; }
    .question-word { font-size: 1.8rem; padding: 14px 20px; }
    .mc-grid { grid-template-columns: 1fr; }
    .mode-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="flag-emoji">🇫🇷</span>
    <h1>Frans Oefenen<br><span>met Olivia</span></h1>
    <p class="subtitle">De quoi as-tu besoin ? · Woordjes leren!</p>
  </header>

  <!-- Score bar -->
  <div class="scorebar">
    <div class="score-pill"><div class="dot dot-green"></div><span id="score-good">0 goed</span></div>
    <div class="score-pill"><div class="dot dot-red"></div><span id="score-bad">0 fout</span></div>
    <div class="score-pill"><div class="dot dot-total"></div><span id="score-total">0 gespeeld</span></div>
  </div>

  <!-- Setup panel -->
  <div id="setup-panel">

    <div class="category-section">
      <h2>📚 Kies categorieën</h2>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="mode-section">
      <h2>🎮 Kies een modus</h2>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="mc-fr-nl" onclick="selectMode(this)">
          <span class="mode-icon">🇫🇷→🇧🇪</span>
          <span class="mode-label">Frans → Nederlands<br><small>(meerkeuze)</small></span>
        </button>
        <button class="mode-btn" data-mode="mc-nl-fr" onclick="selectMode(this)">
          <span class="mode-icon">🇧🇪→🇫🇷</span>
          <span class="mode-label">Nederlands → Frans<br><small>(meerkeuze)</small></span>
        </button>
        <button class="mode-btn" data-mode="type-fr-nl" onclick="selectMode(this)">
          <span class="mode-icon">✏️🇧🇪</span>
          <span class="mode-label">Frans → Typ Nederlands<br><small>(invullen)</small></span>
        </button>
        <button class="mode-btn" data-mode="type-nl-fr" onclick="selectMode(this)">
          <span class="mode-icon">✏️🇫🇷</span>
          <span class="mode-label">Nederlands → Typ Frans<br><small>(invullen)</small></span>
        </button>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">🚀 Start het oefenen!</button>
  </div>

  <!-- Quiz card -->
  <div class="quiz-card" id="quiz-card">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div class="q-counter" id="q-counter"></div>
    <div class="question-box">
      <span class="category-tag" id="cat-tag"></span>
      <div class="direction-label" id="dir-label"></div>
      <div class="question-word" id="question-word"></div>
    </div>
    <div id="answer-area"></div>
    <div class="feedback" id="feedback"></div>
    <div class="correct-answer-reveal" id="correct-reveal"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Volgende vraag →</button>
  </div>

  <!-- Results -->
  <div class="results-card" id="results-card">
    <span class="result-trophy" id="result-trophy">🏆</span>
    <div class="result-title" id="result-title">Super gedaan!</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="wrong-list" id="wrong-list" style="display:none">
      <h3>❌ Nog eens leren:</h3>
      <div id="wrong-items"></div>
    </div>
    <button class="retry-btn" onclick="retryAll()">🔄 Opnieuw spelen</button>
    <button class="wrong-only-btn" id="wrong-only-btn" onclick="retryWrong()" style="display:none">❌ Alleen fouten oefenen</button>
  </div>

</div>

<script>
const VOCAB = {
  "Zelfstandige naamwoorden": [
    ["une baguette","een stokbrood"],["une bouteille","een fles"],["le café","de koffie"],
    ["le coca","de cola"],["une course","een boodschap"],["un fruit / les fruits","een vrucht / fruit"],
    ["un légume","een groente"],["une limonade","een limonade"],["une liste","een lijst"],
    ["une liste des courses","een boodschappenlijst"],["un pain","een brood"],
    ["une poire","een peer"],["une pomme","een appel"],["un supermarché","een supermarkt"],
    ["une école","een school"],["un magasin","een winkel"],["une maison","een huis"],
    ["un croissant","een croissant"],["le séjour","de woonkamer"],["un garage","een garage"],
  ],
  "Werkwoorden": [
    ["aider","helpen"],["faire","doen, maken"],["savoir","weten"],["venir","komen"],["vouloir","willen"],
  ],
  "Faire – vervoeging": [
    ["je fais","ik doe / maak"],["tu fais","jij doet / maakt"],["il / elle fait","hij / zij doet / maakt"],
    ["nous faisons","wij doen / maken"],["vous faites","jullie doen / maken"],["ils / elles font","zij doen / maken"],
  ],
  "Andere woorden": [
    ["maintenant","nu"],["ne … pas","niet, geen"],["ne … plus","niet meer, geen meer"],
    ["rien","niets"],["tout","alles"],["dans","in"],["depuis","sinds"],
    ["contre","tegen"],["sur","op"],["sous","onder"],["devant","voor"],["derrière","achter"],
  ],
  "Vraagwoorden": [
    ["où","waar"],["quel / quelle","welk / welke"],["combien","hoeveel"],
    ["comment","hoe"],["qui","wie"],["quoi","wat"],
  ],
  "Tegenstellingen": [
    ["petit","klein"],["grand","groot"],["beaucoup","veel"],["peu","weinig"],
    ["là","daar"],["ici","hier"],["blanc","wit"],["noir","zwart"],
    ["hier","gisteren"],["demain","morgen"],["gauche","links"],["droite","rechts"],
    ["oui","ja"],["non","nee"],
  ],
  "Uitdrukkingen": [
    ["De quoi as-tu besoin ?","Wat heb je nodig?"],
    ["Il n'est pas là.","Hij is er niet."],
    ["Je sais.","Ik weet het."],
    ["Je ne sais pas.","Ik weet het niet."],
    ["Je veux bien t'aider.","Ik wil je wel helpen."],
    ["Je fais les courses.","Ik doe de boodschappen."],
    ["C'est tout.","Dat is alles."],
    ["Rien pour l'instant.","Niets voor het ogenblik."],
    ["Tu viens avec moi ?","Kom je mee met mij?"],
    ["D'accord.","Akkoord."],
    ["Il me faut …","Ik heb … nodig."],
    ["J'ai besoin de …","Ik heb … nodig."],
  ],
};

const CATEGORY_ICONS = {
  "Zelfstandige naamwoorden":"🛒","Werkwoorden":"⚡","Faire – vervoeging":"📝",
  "Andere woorden":"💬","Vraagwoorden":"❓","Tegenstellingen":"↔️","Uitdrukkingen":"🗣️"
};

let selectedCategories = new Set(Object.keys(VOCAB));
let selectedMode = 'mc-fr-nl';
let questions = [];
let currentQ = 0;
let score = { good: 0, bad: 0, total: 0 };
let wrongAnswers = [];
let sessionTotal = 0;

// Build category buttons
const catGrid = document.getElementById('cat-grid');
Object.keys(VOCAB).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn active';
  btn.innerHTML = `${CATEGORY_ICONS[cat]} ${cat}`;
  btn.onclick = () => {
    btn.classList.toggle('active');
    if (selectedCategories.has(cat)) selectedCategories.delete(cat);
    else selectedCategories.add(cat);
  };
  catGrid.appendChild(btn);
});

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMode = btn.dataset.mode;
}

function buildQuestions(pool) {
  let allPairs = [];
  pool.forEach(cat => {
    (VOCAB[cat] || []).forEach(pair => allPairs.push({ fr: pair[0], nl: pair[1], cat }));
  });
  // Shuffle
  for (let i = allPairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allPairs[i], allPairs[j]] = [allPairs[j], allPairs[i]];
  }
  return allPairs;
}

function getAllAnswers(dir) {
  let all = [];
  Object.values(VOCAB).forEach(pairs => pairs.forEach(p => all.push(dir === 'nl' ? p[1] : p[0])));
  return [...new Set(all)];
}

function getWrongOptions(correct, dir, n = 3) {
  const all = getAllAnswers(dir).filter(a => a !== correct);
  const shuffled = all.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function startQuiz(pool) {
  const cats = pool || [...selectedCategories];
  if (cats.length === 0) { alert("Kies minstens één categorie!"); return; }
  questions = buildQuestions(cats);
  if (questions.length === 0) { alert("Geen woorden gevonden!"); return; }
  currentQ = 0;
  wrongAnswers = [];
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('results-card').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const isFrToNl = selectedMode === 'mc-fr-nl' || selectedMode === 'type-fr-nl';
  const isType = selectedMode.startsWith('type');

  document.getElementById('progress-bar').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('q-counter').textContent = `Vraag ${currentQ + 1} van ${total}`;
  document.getElementById('cat-tag').textContent = `${CATEGORY_ICONS[q.cat]} ${q.cat}`;
  document.getElementById('dir-label').textContent = isFrToNl ? '🇫🇷 Wat betekent dit in het Nederlands?' : '🇧🇪 Hoe zeg je dit in het Frans?';
  document.getElementById('question-word').textContent = isFrToNl ? q.fr : q.nl;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('correct-reveal').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  const correctAnswer = isFrToNl ? q.nl : q.fr;
  const answerArea = document.getElementById('answer-area');

  if (isType) {
    answerArea.innerHTML = `
      <div class="type-wrap">
        <input class="type-input" id="type-input" type="text" placeholder="Typ hier je antwoord..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="check-btn" onclick="checkType()">✓ Check</button>
      </div>`;
    setTimeout(() => document.getElementById('type-input').focus(), 100);
    document.getElementById('type-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkType();
    });
  } else {
    const wrongOpts = getWrongOptions(correctAnswer, isFrToNl ? 'nl' : 'fr');
    const options = [correctAnswer, ...wrongOpts].sort(() => Math.random() - 0.5);
    answerArea.innerHTML = `<div class="mc-grid">${options.map(opt => 
      `<button class="mc-option" onclick="checkMC(this, '${CSS.escape(opt)}', '${CSS.escape(correctAnswer)}')">${opt}</button>`
    ).join('')}</div>`;
  }
}

function CSS_escape(str) { return str.replace(/'/g, "\\'"); }

function checkMC(btn, chosen, correct) {
  // Disable all
  document.querySelectorAll('.mc-option').forEach(b => b.disabled = true);
  const decodedChosen = btn.textContent.trim();
  const decodedCorrect = document.getElementById('question-word').closest('.quiz-card').querySelectorAll('.mc-option');

  // Find correct button
  document.querySelectorAll('.mc-option').forEach(b => {
    if (b.textContent.trim() === decodeURIComponent(correct.replace(/\\'/g, "'"))) {
      b.classList.add('reveal');
    }
  });

  if (decodedChosen === decodeURIComponent(correct.replace(/\\'/g, "'"))) {
    btn.classList.remove('reveal');
    btn.classList.add('correct');
    showFeedback(true);
  } else {
    btn.classList.add('wrong');
    showFeedback(false, questions[currentQ]);
  }
}

// Fix MC handler
document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('mc-option') || e.target.disabled) return;
  const isFrToNl = selectedMode === 'mc-fr-nl';
  const q = questions[currentQ];
  const correctAnswer = isFrToNl ? q.nl : q.fr;
  const chosen = e.target.textContent.trim();

  document.querySelectorAll('.mc-option').forEach(b => { b.disabled = true; });
  document.querySelectorAll('.mc-option').forEach(b => {
    if (b.textContent.trim() === correctAnswer) b.classList.add('reveal');
  });

  if (chosen === correctAnswer) {
    e.target.classList.remove('reveal');
    e.target.classList.add('correct');
    showFeedback(true);
  } else {
    e.target.classList.add('wrong');
    showFeedback(false, q);
  }
  // Remove previous listener interference
  e.stopImmediatePropagation();
}, true);

function checkType() {
  const input = document.getElementById('type-input');
  if (!input) return;
  const typed = input.value.trim().toLowerCase();
  if (!typed) return;
  const isFrToNl = selectedMode === 'type-fr-nl';
  const q = questions[currentQ];
  const correct = (isFrToNl ? q.nl : q.fr).toLowerCase();

  input.disabled = true;
  document.querySelector('.check-btn').disabled = true;

  // Flexible matching: ignore accents, articles, extra spaces
  const normalize = s => s.replace(/[éèêë]/g,'e').replace(/[àâ]/g,'a').replace(/[ùû]/g,'u').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ç]/g,'c').replace(/\s+/g,' ').trim();
  const isCorrect = normalize(typed) === normalize(correct) || typed === correct.toLowerCase();

  if (isCorrect) {
    input.classList.add('correct');
    showFeedback(true);
  } else {
    input.classList.add('wrong');
    showFeedback(false, q);
  }
}

function showFeedback(correct, q) {
  const msgs_good = ["Super! 🌟","Bravo! 🎉","Uitstekend! 🏆","Geweldig! ✨","Top! 🚀","Parfait! 🇫🇷"];
  const msgs_bad = ["Bijna! 💪","Oefenen maar! 📚","Probeer het nog eens! 🔄","Niet erg! 😊"];
  const fb = document.getElementById('feedback');
  const reveal = document.getElementById('correct-reveal');

  if (correct) {
    fb.textContent = msgs_good[Math.floor(Math.random() * msgs_good.length)];
    fb.className = 'feedback correct-msg';
    score.good++;
  } else {
    fb.textContent = msgs_bad[Math.floor(Math.random() * msgs_bad.length)];
    fb.className = 'feedback wrong-msg';
    score.bad++;
    if (q) {
      wrongAnswers.push(q);
      reveal.textContent = `✅ Het juiste antwoord: ${selectedMode.includes('fr-nl') || selectedMode.includes('type-fr') ? q.nl : q.fr}`;
    }
  }
  score.total++;
  sessionTotal++;
  updateScorebar();
  document.getElementById('next-btn').style.display = 'block';
}

function updateScorebar() {
  document.getElementById('score-good').textContent = `${score.good} goed`;
  document.getElementById('score-bad').textContent = `${score.bad} fout`;
  document.getElementById('score-total').textContent = `${score.total} gespeeld`;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-card').style.display = 'none';
  const pct = Math.round((score.good / score.total) * 100);
  let trophy = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '💪' : '📚';
  let title = pct >= 90 ? 'Fantastisch gedaan!' : pct >= 70 ? 'Goed bezig!' : pct >= 50 ? 'Blijven oefenen!' : 'Niet erg, probeer opnieuw!';
  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `${score.good}/${score.total}`;
  document.getElementById('result-sub').textContent = `${pct}% correct · Blijf zo doorgaan! 💪`;

  const wrongList = document.getElementById('wrong-list');
  const wrongItems = document.getElementById('wrong-items');
  const wrongBtn = document.getElementById('wrong-only-btn');
  if (wrongAnswers.length > 0) {
    wrongItems.innerHTML = wrongAnswers.map(w =>
      `<div class="wrong-item"><span class="wrong-fr">${w.fr}</span><span class="wrong-nl">${w.nl}</span></div>`
    ).join('');
    wrongList.style.display = 'block';
    wrongBtn.style.display = 'inline-block';
  } else {
    wrongList.style.display = 'none';
    wrongBtn.style.display = 'none';
  }
  document.getElementById('results-card').style.display = 'block';
}

function retryAll() {
  score = { good: 0, bad: 0, total: 0 };
  updateScorebar();
  document.getElementById('setup-panel').style.display = 'block';
  document.getElementById('results-card').style.display = 'none';
}

function retryWrong() {
  const wrongCats = [...new Set(wrongAnswers.map(w => w.cat))];
  const wrongPool = {};
  wrongAnswers.forEach(w => {
    if (!wrongPool[w.cat]) wrongPool[w.cat] = [];
    wrongPool[w.cat].push([w.fr, w.nl]);
  });
  // temporarily override VOCAB for this session
  const savedVocab = {};
  wrongCats.forEach(cat => {
    savedVocab[cat] = VOCAB[cat];
    VOCAB[cat] = wrongPool[cat];
  });
  score = { good: 0, bad: 0, total: 0 };
  updateScorebar();
  document.getElementById('results-card').style.display = 'none';
  startQuiz(wrongCats);
  // restore after
  setTimeout(() => { wrongCats.forEach(cat => VOCAB[cat] = savedVocab[cat]); }, 500);
}
</script>
